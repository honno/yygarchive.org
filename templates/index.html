{% extends "base.html" %}

{% block content %}
<div class="controls">
  <div class="controls-row">
    <input type="text" id="search" placeholder="Search games, developers, tags…" autofocus>
    <div class="control-group">
      <label>Sort</label>
      <select id="sort">
        <option value="downloads">Downloads</option>
        <option value="rating">Rating</option>
        <option value="nratings">No. ratings</option>
        <option value="date-desc">Date (newest)</option>
        <option value="date-asc">Date (oldest)</option>
        <option value="slug">A–Z</option>
        <option value="random">Random</option>
      </select>
    </div>
    <button id="filters-btn" aria-label="Filters">Filters</button>
  </div>

  <div id="filter-panel">
    <div class="filter-panel-inner">
      <div class="filter-sheet-handle"></div>
      <div class="controls-row">
        <div class="control-group">
          <label>Year</label>
          <div class="date-range">
            <select id="year-from">
              <option value="">From</option>
            </select>
            <span class="range-sep">–</span>
            <select id="year-to">
              <option value="">To</option>
            </select>
          </div>
        </div>

        <div class="control-group">
          <label>Min rating <span id="rating-val">0</span></label>
          <div class="range-wrap"><input type="range" id="min-rating" min="0" max="5" step="0.1" value="0"></div>
        </div>

        <div class="control-group">
          <label>Min downloads</label>
          <input type="number" id="min-downloads" min="0" max="600299" step="1" value="" placeholder="0">
        </div>

        <div class="control-group">
          <label>Min no. ratings</label>
          <input type="number" id="min-nratings" min="0" max="12549" step="1" value="" placeholder="0">
        </div>

        <div class="control-group" style="margin-left:auto"><label>&nbsp;</label><button id="reset-filters">Reset filters</button></div>
      </div>
    </div>
  </div>
  <div id="filter-overlay"></div>
</div>

<div id="status">
  <span id="result-count"></span>
  <span id="dev-badge" style="display:none">
    Developer: <span id="dev-badge-name"></span>
    <button id="dev-badge-clear">✕</button>
  </span>
  <span id="category-badge" style="display:none">
    Category: <span id="category-badge-name"></span>
    <button id="category-badge-clear">✕</button>
  </span>
  <span id="tag-badge" style="display:none">
    Tag: <span id="tag-badge-name"></span>
    <button id="tag-badge-clear">✕</button>
  </span>
</div>
<div id="loading">Loading game database…</div>
<div id="pagination-top">
  <button id="first-top">« First</button>
  <button id="prev-top">← Prev</button>
  <span class="page-info">Page <input class="page-input" id="page-input-top" type="number" min="1"> of <span class="page-total" id="page-total-top"></span></span>
  <button id="next-top">Next →</button>
  <button id="last-top">Last »</button>
</div>
<div id="results"></div>
<div id="no-results">No games found.</div>
<div id="pagination">
  <button id="first">« First</button>
  <button id="prev">← Prev</button>
  <span class="page-info">Page <input class="page-input" id="page-input" type="number" min="1"> of <span class="page-total" id="page-total"></span></span>
  <button id="next">Next →</button>
  <button id="last">Last »</button>
</div>

<div id="modal-overlay" style="display:none">
  <div id="modal">
    <button id="modal-close">✕</button>
    <div id="modal-title-row">
      <div id="modal-title"></div>
      <a id="modal-permalink" href="" target="_blank" rel="noopener" aria-label="Open game page"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
    </div>
    <div id="modal-meta"></div>
    <div id="modal-stats"></div>
    <div id="modal-desc"></div>
    <div id="modal-tags"></div>
    <div id="modal-info"></div>
    <a id="modal-dl" href="" target="_blank" rel="noopener">⤓ Download</a>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const PAGE_SIZE = 50;

  let allGames = [];
  let filtered = {{ initial_games_json | default('[]') | safe }};
  let currentPage = 0;
  let devFilter = '';
  let categoryFilter = '';
  let tagFilter = '';

  const yearFromEl = document.getElementById('year-from');
  const yearToEl = document.getElementById('year-to');

  for (let y = 2007; y <= 2014; y++) {
    yearFromEl.innerHTML += `<option value="${y}">${y}</option>`;
    yearToEl.innerHTML += `<option value="${y}">${y}</option>`;
  }

  function syncYearSelects() {
    const from = yearFromEl.value;
    const to = yearToEl.value;
    if (from && to && from > to) {
      if (this === yearFromEl) yearToEl.value = from;
      else yearFromEl.value = to;
    }
    applyFilters();
  }

  yearFromEl.addEventListener('change', syncYearSelects);
  yearToEl.addEventListener('change', syncYearSelects);

  const minRatingEl = document.getElementById('min-rating');
  const ratingVal = document.getElementById('rating-val');
  minRatingEl.addEventListener('input', () => {
    ratingVal.textContent = parseFloat(minRatingEl.value).toFixed(1);
    applyFilters();
  });

  function truncateDesc(html, max = 200) {
    const text = html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    return text.length > max ? text.slice(0, max).trimEnd() + '…' : text;
  }

  function renderCardTags(tags, max = 100) {
    let list = tags.split(',').map(t => t.trim()).filter(Boolean);
    let chips = '', len = 0;
    for (const t of list) {
      if (len && len + t.length + 2 > max) { chips += `<span class="card-tag card-tag-more">…</span>`; break; }
      chips += `<span class="card-tag">${t}</span>`;
      len += t.length + 2;
    }
    return chips;
  }

  function fmtDl(n) {
    if (n >= 1000) return Math.round(n / 1000) + 'k';
    return String(n);
  }

  function stars(rating, nratings) {
    const full = Math.round(rating);
    if (nratings === 0) return `<span class="stars-none">${'☆'.repeat(5)}</span>`;
    return `${'★'.repeat(full)}${'☆'.repeat(5 - full)} ${rating.toFixed(1)}`;
  }

  function hasActiveFilter() {
    return (
      document.getElementById('search').value.trim() ||
      categoryFilter ||
      yearFromEl.value ||
      yearToEl.value ||
      parseFloat(document.getElementById('min-rating').value) > 0 ||
      document.getElementById('min-downloads').value !== '' ||
      document.getElementById('min-nratings').value !== '' ||
      devFilter ||
      tagFilter
    );
  }

  function clearHashIfMatch(prefix) {
    if (location.hash.startsWith(prefix)) history.replaceState(null, '', location.pathname);
  }

  function setDevFilter(dev) {
    devFilter = dev;
    const badge = document.getElementById('dev-badge');
    badge.style.display = dev ? 'inline-flex' : 'none';
    document.getElementById('dev-badge-name').textContent = dev;
    if (!dev) clearHashIfMatch('#developer=');
    applyFilters();
  }

  function setTagFilter(tag) {
    tagFilter = tag;
    const badge = document.getElementById('tag-badge');
    badge.style.display = tag ? 'inline-flex' : 'none';
    document.getElementById('tag-badge-name').textContent = tag;
    if (!tag) clearHashIfMatch('#tag=');
    applyFilters();
  }

  function setCategoryFilter(category) {
    categoryFilter = category;
    const badge = document.getElementById('category-badge');
    badge.style.display = category ? 'inline-flex' : 'none';
    document.getElementById('category-badge-name').textContent = category;
    if (!category) clearHashIfMatch('#category=');
    applyFilters();
  }

  function renderPage() {
    const results = document.getElementById('results');
    const noResults = document.getElementById('no-results');
    const pagination = document.getElementById('pagination');
    const paginationTop = document.getElementById('pagination-top');

    if (filtered.length === 0) {
      results.innerHTML = '';
      noResults.style.display = 'block';
      pagination.style.display = 'none';
      paginationTop.style.display = 'none';
      document.getElementById('result-count').textContent = 'No results.';
      return;
    }

    noResults.style.display = 'none';

    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    const start = currentPage * PAGE_SIZE;
    const page = filtered.slice(start, start + PAGE_SIZE);

    results.innerHTML = page.map(g => {
      const dlLink = `<a href="https://archive.org${g.path}" target="_blank" rel="noopener">⤓ Download</a>`;
      return `
        <div class="card" data-id="${g.id}">
          <a class="card-title" href="#game=${g.id}">${g.title}</a>
          <div class="card-meta">
            <a class="card-dev" href="#developer=${encodeURIComponent(g.dev)}">${g.dev}</a>
            <span>·</span>
            <span>${g.date.slice(0, 4)}</span>
            <span class="card-category" data-category="${g.category}">${g.category}</span>
          </div>
          ${g.desc ? `<div class="card-desc">${truncateDesc(g.desc)}</div>` : ''}
          ${g.tags ? `<div class="card-tags">${renderCardTags(g.tags)}</div>` : ''}
          <div class="card-footer">
            <span class="rating">${stars(g.rating, g.nratings)}${g.nratings > 0 ? `<span class="card-dl-count">(${fmtDl(g.nratings)})</span>` : ''}</span>
            ${dlLink}
          </div>
        </div>`;
    }).join('');

    document.getElementById('result-count').textContent =
      `${filtered.length.toLocaleString()} result${filtered.length !== 1 ? 's' : ''} — showing ${(start + 1).toLocaleString()}–${Math.min(start + PAGE_SIZE, filtered.length).toLocaleString()}`;

    const atFirst = currentPage === 0;
    const atLast = currentPage >= totalPages - 1;

    pagination.style.display = 'flex';
    document.getElementById('page-input').value = currentPage + 1;
    document.getElementById('page-input').max = totalPages;
    document.getElementById('page-total').textContent = totalPages;
    document.getElementById('first').disabled = atFirst;
    document.getElementById('prev').disabled = atFirst;
    document.getElementById('next').disabled = atLast;
    document.getElementById('last').disabled = atLast;

    paginationTop.style.display = 'flex';
    document.getElementById('page-input-top').value = currentPage + 1;
    document.getElementById('page-input-top').max = totalPages;
    document.getElementById('page-total-top').textContent = totalPages;
    document.getElementById('first-top').disabled = atFirst;
    document.getElementById('prev-top').disabled = atFirst;
    document.getElementById('next-top').disabled = atLast;
    document.getElementById('last-top').disabled = atLast;

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function applyFilters() {
    const query = document.getElementById('search').value.trim().toLowerCase();
    const sort = document.getElementById('sort').value;
    const yearFromVal = yearFromEl.value;
    const yearToVal = yearToEl.value;
    const minRating = parseFloat(document.getElementById('min-rating').value);
    const minDownloadsRaw = document.getElementById('min-downloads').value;
    const minNratingsRaw = document.getElementById('min-nratings').value;
    const minDownloads = minDownloadsRaw !== '' ? parseInt(minDownloadsRaw) : 0;
    const minNratings = minNratingsRaw !== '' ? parseInt(minNratingsRaw) : 0;
    filtered = allGames.filter(g => {
      if (devFilter && g.dev !== devFilter) return false;
      if (categoryFilter && g.category !== categoryFilter) return false;
      if (tagFilter && !g.tags.split(',').map(t => t.trim()).includes(tagFilter)) return false;
      if (yearFromVal && g.date.slice(0, 4) < yearFromVal) return false;
      if (yearToVal && g.date.slice(0, 4) > yearToVal) return false;
      if (minRating > 0 && g.rating < minRating) return false;
      if (minDownloads > 0 && g.downloads < minDownloads) return false;
      if (minNratings > 0 && g.nratings < minNratings) return false;
      if (query && !(
        g.title.toLowerCase().includes(query) ||
        g.dev.toLowerCase().includes(query) ||
        g.tags.toLowerCase().includes(query) ||
        g.desc.toLowerCase().includes(query)
      )) return false;
      return true;
    });

    if (sort === 'random') {
      filtered = [...filtered].sort(() => Math.random() - 0.5);
    } else {
      filtered = [...filtered].sort((a, b) => {
        if (sort === 'downloads') return b.downloads - a.downloads;
        if (sort === 'rating') return b.rating - a.rating;
        if (sort === 'nratings') return b.nratings - a.nratings;
        if (sort === 'date-desc') return b.date.localeCompare(a.date);
        if (sort === 'date-asc') return a.date.localeCompare(b.date);
        if (sort === 'slug') {
          const aLetter = /^[a-z]/i.test(a.slug);
          const bLetter = /^[a-z]/i.test(b.slug);
          if (aLetter !== bLetter) return aLetter ? -1 : 1;
          return a.slug.localeCompare(b.slug);
        }
        return 0;
      });
    }

    currentPage = 0;
    const isActive = !!hasActiveFilter();
    document.getElementById('reset-filters').classList.toggle('active', isActive);
    document.getElementById('filters-btn').classList.toggle('active', isActive);
    renderPage();
  }

  document.getElementById('dev-badge-clear').addEventListener('click', () => setDevFilter(''));
  document.getElementById('category-badge-clear').addEventListener('click', () => setCategoryFilter(''));
  document.getElementById('tag-badge-clear').addEventListener('click', () => setTagFilter(''));
  document.getElementById('search').addEventListener('input', applyFilters);
  document.getElementById('sort').addEventListener('change', applyFilters);
  document.getElementById('min-downloads').addEventListener('input', applyFilters);
  document.getElementById('min-nratings').addEventListener('input', applyFilters);
  document.getElementById('reset-filters').addEventListener('click', () => {
    document.getElementById('search').value = '';
    yearFromEl.value = '';
    yearToEl.value = '';
    document.getElementById('min-rating').value = 0;
    ratingVal.textContent = '0';
    document.getElementById('min-downloads').value = '';
    document.getElementById('min-nratings').value = '';
    setDevFilter('');
    setCategoryFilter('', false);
    setTagFilter('', false);
    history.replaceState(null, '', location.pathname);
    applyFilters();
  });

  function goFirst() { if (currentPage > 0) { currentPage = 0; renderPage(); } }
  function goPrev() { if (currentPage > 0) { currentPage--; renderPage(); } }
  function goNext() { const t = Math.ceil(filtered.length / PAGE_SIZE); if (currentPage < t - 1) { currentPage++; renderPage(); } }
  function goLast() { const t = Math.ceil(filtered.length / PAGE_SIZE); if (currentPage < t - 1) { currentPage = t - 1; renderPage(); } }

  document.getElementById('first').addEventListener('click', goFirst);
  document.getElementById('prev').addEventListener('click', goPrev);
  document.getElementById('next').addEventListener('click', goNext);
  document.getElementById('last').addEventListener('click', goLast);
  document.getElementById('first-top').addEventListener('click', goFirst);
  document.getElementById('prev-top').addEventListener('click', goPrev);
  document.getElementById('next-top').addEventListener('click', goNext);
  document.getElementById('last-top').addEventListener('click', goLast);

  function goToPage(input) {
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    const p = Math.max(1, Math.min(totalPages, parseInt(input.value) || 1));
    input.value = p;
    if (p - 1 !== currentPage) { currentPage = p - 1; renderPage(); }
  }
  document.getElementById('page-input').addEventListener('change', e => goToPage(e.target));
  document.getElementById('page-input').addEventListener('keydown', e => { if (e.key === 'Enter') goToPage(e.target); });
  document.getElementById('page-input-top').addEventListener('change', e => goToPage(e.target));
  document.getElementById('page-input-top').addEventListener('keydown', e => { if (e.key === 'Enter') goToPage(e.target); });

  let gameIndex = null;

  function openModal(id, updateHash = true) {
    if (!gameIndex) gameIndex = new Map(allGames.map(g => [g.id, g]));
    const g = gameIndex.get(id);
    if (!g) return;
    document.getElementById('modal-title').textContent = g.title;
    const prettyDate = new Date(g.date).toLocaleDateString('en-GB', {day: 'numeric', month: 'short', year: 'numeric'});
    document.getElementById('modal-meta').innerHTML =
      `<span class="modal-dev" data-dev="${g.dev}">${g.dev}</span> · ${prettyDate} · <span class="modal-category" data-category="${g.category}">${g.category}</span>`;
    document.getElementById('modal-stats').innerHTML =
      `${stars(g.rating, g.nratings)} <span class="modal-stats-meta">${g.nratings.toLocaleString()} ratings · ${g.downloads.toLocaleString()} downloads</span>`;
    document.getElementById('modal-info').innerHTML =
      `ID: ${g.id} · Slug: ${g.slug} · Version: ${g.ver}`;
    document.getElementById('modal-desc').innerHTML = g.desc || '';
    document.getElementById('modal-tags').innerHTML = g.tags
      ? g.tags.split(',').map(t => `<span class="modal-tag">${t.trim()}</span>`).join('')
      : '';
    document.getElementById('modal-dl').href = `https://archive.org${g.path}`;
    document.getElementById('modal-permalink').href = `/game/${g.id}`;
    document.getElementById('modal-overlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    if (updateHash) history.pushState(null, '', '#game=' + id);
  }

  function closeModal(updateHash = true) {
    document.getElementById('modal-overlay').style.display = 'none';
    document.body.style.overflow = '';
    if (updateHash) clearHashIfMatch('#game=');
  }

  function applyFromHash() {
    const hash = location.hash;
    if (hash.startsWith('#developer=')) {
      setDevFilter(decodeURIComponent(hash.slice(11)));
    } else if (hash.startsWith('#category=')) {
      setCategoryFilter(decodeURIComponent(hash.slice(10)));
    } else if (hash.startsWith('#tag=')) {
      setTagFilter(decodeURIComponent(hash.slice(5)));
    } else {
      closeModal(false);
      applyFilters();
    }
    if (hash.startsWith('#game=')) {
      openModal(parseInt(hash.slice(6)), false);
    }
  }

  window.addEventListener('popstate', applyFromHash);

  const filterPanel = document.getElementById('filter-panel');
  const filterOverlay = document.getElementById('filter-overlay');
  function openFilters() {
    filterPanel.classList.add('open');
    filterOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeFilters() {
    filterPanel.classList.remove('open');
    filterOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('filters-btn').addEventListener('click', openFilters);
  filterOverlay.addEventListener('click', closeFilters);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFilters(); });

  document.getElementById('modal-close').addEventListener('click', () => closeModal());
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (!e.target.closest('#modal')) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('modal-overlay').style.display !== 'none') closeModal();
  });

  document.getElementById('results').addEventListener('click', e => {
    const cat = e.target.closest('.card-category');
    if (cat) { setCategoryFilter(cat.dataset.category); return; }
    const tag = e.target.closest('.card-tag:not(.card-tag-more)');
    if (tag) { setTagFilter(tag.textContent); return; }
    const title = e.target.closest('.card-title');
    if (title) {
      e.preventDefault();
      const card = title.closest('.card');
      openModal(parseInt(card.dataset.id));
      return;
    }
    const dev = e.target.closest('.card-dev');
    if (dev) {
      e.preventDefault();
      setDevFilter(decodeURIComponent(dev.href.split('#developer=')[1] || ''));
    }
  });

  document.getElementById('modal-tags').addEventListener('click', e => {
    const tag = e.target.closest('.modal-tag');
    if (!tag) return;
    closeModal(false);
    setTagFilter(tag.textContent);
  });

  document.getElementById('modal-meta').addEventListener('click', e => {
    const dev = e.target.closest('.modal-dev');
    if (dev) { closeModal(false); setDevFilter(dev.dataset.dev); return; }
    const cat = e.target.closest('.modal-category');
    if (cat) { closeModal(false); setCategoryFilter(cat.dataset.category); }
  });

  const searchEl = document.getElementById('search');
  const mq = window.matchMedia('(max-width: 640px)');
  function updatePlaceholder() {
    searchEl.placeholder = mq.matches ? 'Search…' : 'Search games, developers, tags…';
  }
  mq.addEventListener('change', updatePlaceholder);
  updatePlaceholder();

  if (filtered.length > 0) {
    renderPage();
  }

  fetch('/games.json')
    .then(r => r.json())
    .then(data => {
      allGames = data;
      document.getElementById('loading').style.display = 'none';
      applyFromHash();
    })
    .catch(err => {
      document.getElementById('loading').textContent = 'Failed to load games.json: ' + err;
    });
</script>
{% endblock %}
